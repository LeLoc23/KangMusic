<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bài hát đã thích - KangMusic')}"></head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments :: top-bar}"></div>
    <div class="main-layout">
        <div th:replace="~{fragments :: library-sidebar}"></div>
        <main class="content-area" id="main-content" th:fragment="main-content" th:with="pageTitle='Thư viện - KangMusic'">

            <div class="content-header">
                <h2 class="page-title" th:text="${pageTitle}">Thư viện - KangMusic</h2>
            </div>

            <!-- Liked Songs Hero Header -->
            <div class="liked-songs-hero">
                <div class="liked-songs-cover">
                    <svg viewBox="0 0 24 24" fill="white" width="80" height="80">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
                <div class="liked-songs-meta">
                    <span class="liked-songs-type">Playlist</span>
                    <h1 class="liked-songs-title">Bài hát đã thích</h1>
                    <div class="liked-songs-info">
                        <span class="liked-songs-owner" sec:authentication="name" th:text="${#authentication != null ? #authentication.name : 'Bạn'}">Bạn</span>
                        <span class="liked-songs-sep">•</span>
                        <span th:text="${libraryItems != null ? libraryItems.size() : 0} + ' bài hát'">0 bài hát</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="playlist-action-bar">
                <button class="playlist-play-big-btn" id="btn-play-liked" th:if="${libraryItems != null and !#lists.isEmpty(libraryItems)}">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="playlist-shuffle-btn" title="Trộn bài">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                    </svg>
                </button>
            </div>

            <!-- Empty state -->
            <div th:if="${libraryItems == null or #lists.isEmpty(libraryItems)}" class="empty-state">
                <div class="empty-state-icon">❤️</div>
                <div class="empty-state-title">Thư viện trống</div>
                <p class="empty-state-desc">Nhấn nút ♡ trên player bar khi đang nghe để thêm bài vào thư viện!</p>
            </div>

            <!-- Track Table -->
            <div class="liked-tracks-container" th:unless="${libraryItems == null or #lists.isEmpty(libraryItems)}">
                <table class="track-table liked-track-table">
                    <thead>
                        <tr>
                            <th class="track-num">#</th>
                            <th>Tiêu đề</th>
                            <th class="col-album">Album</th>
                            <th class="col-date">Ngày thêm</th>
                            <th class="col-duration">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item, stat : ${libraryItems}" class="track-row"
                            th:data-src="@{'/stream/' + ${item.fileName}}"
                            th:data-id="${item.id}"
                            th:data-title="${item.title}"
                            th:data-artist="${item.artist}"
                            th:data-genre="${item.genre}"
                            th:data-emotion="${item.emotionLabel}"
                            th:data-lyrics="${item.lyrics}">
                            <td class="track-num">
                                <span class="track-num-label" th:text="${stat.index + 1}">1</span>
                                <button class="track-play-btn media-play-btn"
                                        th:data-src="@{'/stream/' + ${item.fileName}}"
                                        th:data-id="${item.id}"
                                        th:data-title="${item.title}"
                                        th:data-artist="${item.artist}"
                                        th:data-type="${item.type}"
                                        th:data-genre="${item.genre}"
                                        th:data-emotion="${item.emotionLabel}"
                                        th:data-lyrics="${item.lyrics}"
                                        th:data-poster="${item.posterFilename}"
                                        aria-label="Phát">▶</button>
                            </td>
                            <td class="track-title-cell">
                                <div class="track-title-with-art">
                                    <div class="track-art-mini" style="position:relative; overflow:hidden;">
                                        <img th:if="${item.posterFilename != null}" 
                                             th:src="@{'/stream/' + ${item.posterFilename}}" 
                                             style="width:100%; height:100%; object-fit:cover;">
                                        <span th:if="${item.posterFilename == null}" th:text="${item.type.name() == 'VIDEO' ? '🎬' : '🎵'}">🎵</span>
                                    </div>
                                    <div class="track-title-info">
                                        <div class="track-title-name" th:text="${item.title}">Tên bài</div>
                                        <div class="track-title-artist" th:text="${item.artist}">Ca sĩ</div>
                                    </div>
                                </div>
                            </td>
                            <td class="col-album track-artist-cell" th:text="${item.title}">Album</td>
                            <td class="col-date track-artist-cell">vừa thêm</td>
                            <td class="col-duration track-duration-cell"
                                th:text="${item.durationSeconds != null ?
                                    (#numbers.formatInteger(item.durationSeconds / 60, 1) + ':' +
                                     #numbers.formatInteger(item.durationSeconds % 60, 2)) : '--'}">
                            </td>
                            <td>
                                <form th:action="@{/library/remove}" method="post" style="margin:0;">
                                    <input type="hidden" name="mediaItemId" th:value="${item.id}">
                                    <button type="submit" class="track-remove-btn" title="Bỏ thích">✕</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="height:120px;"></div>
        </main>
        
        <!-- RIGHT SIDEBAR (Queue/Lyrics) -->
        <div th:replace="~{fragments :: right-sidebar}"></div>
    </div>
    <div th:replace="~{fragments :: global-player}"></div>
</div>

</body>
</html>
