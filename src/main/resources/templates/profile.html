<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>
    <title>Hồ Sơ Cá Nhân - KangMusic</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/player.css(v=6)}">
    <link rel="stylesheet" th:href="@{/css/playlist.css}">
    <link rel="stylesheet" th:href="@{/css/modal.css}">
    <link rel="stylesheet" th:href="@{/css/track.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/add.css}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer th:src="@{/js/app.js(v=16)}"></script>
</head>
<body hx-boost="false">

<div class="page-wrapper">
    <div th:replace="~{fragments :: top-bar}"></div>
    <div class="main-layout">
        <div th:replace="~{fragments :: library-sidebar}"></div>

        <!-- MAIN CONTENT (HTMX target) -->
        <main class="content-area" id="main-content">
            <div style="padding: 40px 24px;">
                <div class="auth-wrapper" style="max-width:520px; margin: 0 auto;">
                    <br>
                    <div class="auth-container">
                        <h2>👤 Hồ Sơ Của Bạn</h2>

                        <div th:if="${param.success}" class="auth-alert auth-alert-success">
                            Đổi mật khẩu thành công!
                        </div>
                        <div th:if="${param.error}" class="auth-alert auth-alert-error">
                            <span th:if="${param.error[0] == 'old_wrong'}">Mật khẩu cũ không chính xác!</span>
                            <span th:if="${param.error[0] == 'weak_pass'}">Mật khẩu mới phải >= 6 ký tự và có chữ hoa!</span>
                            <span th:if="${param.error[0] == 'mismatch'}">Mật khẩu nhập lại không khớp!</span>
                        </div>

                        <!-- User info -->
                        <div class="profile-info-box">
                            <div class="profile-info-row">
                                <span class="profile-info-label">Tên đăng nhập</span>
                                <span class="profile-info-value" th:text="${user.username}">username</span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Họ và tên</span>
                                <span class="profile-info-value" th:text="${user.fullName == '' ? 'Chưa cập nhật' : user.fullName}">Họ tên</span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label">Vai trò</span>
                                <span class="profile-info-value" th:text="${user.role == 'ROLE_ADMIN' ? '👑 Quản Trị Viên' : '🎧 Người Dùng'}">Người dùng</span>
                            </div>
                        </div>

                        <!-- Change password -->
                        <div class="section-subtitle">Đổi Mật Khẩu</div>

                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="form-group">
                                <label>Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" required placeholder="Nhập mật khẩu đang dùng...">
                            </div>
                            <div class="form-group">
                                <label>Mật khẩu mới</label>
                                <input type="password" name="newPassword" required
                                       pattern="^(?=.*[A-Z]).{6,}$"
                                       title="Tối thiểu 6 ký tự, có chữ hoa"
                                       placeholder="Tối thiểu 6 ký tự, có 1 chữ hoa...">
                            </div>
                            <div class="form-group">
                                <label>Xác nhận mật khẩu mới</label>
                                <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới...">
                            </div>
                            <button type="submit">CẬP NHẬT MẬT KHẨU</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Mobile padding -->
            <div style="height: 100px;"></div>
        </main>
        
        <!-- RIGHT SIDEBAR (Queue/Lyrics) -->
        <div th:replace="~{fragments :: right-sidebar}"></div>
    </div>
    
    <!-- GLOBAL PLAYER persists -->
    <div th:replace="~{fragments :: global-player}"></div>
</div>

</body>
</html>
