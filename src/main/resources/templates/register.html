<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản - KangMusic</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=2)}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-logo">
        <a th:href="@{/}">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#1db954">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
            <span class="auth-logo-text">KangMusic</span>
        </a>
    </div>

    <div class="auth-container">
        <h2>✨ Tạo Tài Khoản Mới</h2>

        <div th:if="${error}" class="auth-alert auth-alert-error" th:text="${error}">Lỗi</div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Họ và Tên (Tùy chọn)</label>
                <input type="text" name="fullName" placeholder="VD: Nguyễn Văn A">
            </div>

            <div class="form-group">
                <label>Email liên hệ</label>
                <input type="email" name="email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label>Tên đăng nhập / Username</label>
                <input type="text" name="username" required placeholder="VD: nguyen_a_123">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required 
                       pattern="^(?=.*[A-Z]).{6,}$"
                       title="Mật khẩu tối thiểu 6 ký tự, có ít nhất 1 chữ hoa"
                       placeholder="Ít nhất 6 ký tự, có 1 chữ hoa...">
            </div>

            <div class="form-group">
                <label>Nhập lại mật khẩu</label>
                <input type="password" name="confirmPassword" required placeholder="Xác nhận lại mật khẩu...">
            </div>

            <button type="submit">ĐĂNG KÝ NGAY</button>
        </form>

        <div class="auth-divider">hoặc</div>

        <div class="auth-links">
            <p>Đã có tài khoản?</p>
            <a th:href="@{/login}">Đăng nhập tại đây</a>
        </div>
    </div>
</div>

</body>
</html>
