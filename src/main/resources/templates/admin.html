<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị KangMusic</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-container">
        <h1 class="admin-header">🛠️ Bảng Điều Khiển Admin</h1>
        <div style="text-align: right; margin-bottom: 20px;">
            <a href="/" class="auth-btn register-btn">⬅ Quay lại Trang chủ</a>
        </div>

        <div class="admin-section">
            <h3>👥 Quản lý Người Dùng</h3>
            <table>
                <tr>
                    <th>ID</th><th>Username</th><th>Họ Tên</th><th>Quyền</th><th>Trạng thái</th><th>Thao tác</th>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.fullName}">Tên</td>
                    
                    <td>
                        <div th:if="${user.username != currentUsername}">
                            <form th:action="@{/admin/user/role}" method="post" class="action-form">
                                <input type="hidden" name="id" th:value="${user.id}">
                                <select name="newRole" onchange="this.form.submit()" style="padding: 3px; background: #282828; color: white; border: none;">
                                    <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">User</option>
                                    <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">Admin</option>
                                </select>
                            </form>
                        </div>
                        
                        <div th:unless="${user.username != currentUsername}">
                            <span style="color: #1db954; font-weight: bold;">Admin</span>
                        </div>
                    </td>
                    
                    <td th:text="${user.locked ? 'Bị khóa 🔒' : 'Hoạt động 🟢'}">Trạng thái</td>
                    
                    <td>
                        <div th:if="${user.username != currentUsername}">
                            <form th:action="@{/admin/user/lock}" method="post" class="action-form">
                                <input type="hidden" name="id" th:value="${user.id}">
                                <button type="submit" class="btn btn-warning" th:text="${user.locked ? 'Mở khóa' : 'Khóa'}"></button>
                            </form>
                            <form th:action="@{/admin/user/delete}" method="post" class="action-form" onsubmit="return confirm('Bạn có chắc chắn muốn xóa user này?');">
                                <input type="hidden" name="id" th:value="${user.id}">
                                <button type="submit" class="btn btn-delete">Xóa</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <div class="admin-section">
            <h3>🎵 Quản lý Bài Hát & Video</h3>
            <div style="margin-bottom: 10px;">
                <a th:href="@{/add}" class="btn btn-success" style="text-decoration: none;">➕ Thêm mới</a>
            </div>
            <table>
                <tr>
                    <th>ID</th><th>Tên Bài Hát</th><th>Ca sĩ</th><th>Cảm xúc</th><th>File</th><th>Thao tác</th>
                </tr>
                <tr th:each="item : ${mediaItems}">
                    <td th:text="${item.id}">1</td>
                    <td th:text="${item.title}">Bài hát</td>
                    <td th:text="${item.artist}">Ca sĩ</td>
                    <td th:text="${item.emotionLabel}">Vui vẻ</td>
                    <td th:text="${item.fileName}">file.mp3</td>
                    <td>
                        <form th:action="@{/admin/media/delete}" method="post" class="action-form" onsubmit="return confirm('Xóa bài hát này khỏi Database?');">
                            <input type="hidden" name="id" th:value="${item.id}">
                            <button type="submit" class="btn btn-delete">Xóa</button>
                        </form>
                    </td>
                </tr>
            </table>
        </div>

    </div>
</body>
</html>
