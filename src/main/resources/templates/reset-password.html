<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Đặt Lại Mật Khẩu - KangMusic')}"></head>
<body class="auth-page" hx-boost="false">

<div class="auth-wrapper">
    <div class="auth-logo">
        <a th:href="@{/}">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="#1db954">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
            <span class="auth-logo-text">KangMusic</span>
        </a>
    </div>

    <div class="auth-container">
        <h2>🔑 Đặt Lại Mật Khẩu</h2>

        <p style="text-align:center; color:var(--sp-text-muted); font-size:14px; margin-bottom:24px; line-height:1.6;">
            Vui lòng nhập mật khẩu mới cho tài khoản của bạn.
        </p>

        <div th:if="${error}" class="auth-alert auth-alert-error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label>Mật khẩu mới <span style="color:var(--sp-green)">*</span></label>
                <input type="password" name="password" required
                       pattern="^(?=.*[A-Z]).{6,}$"
                       title="Tối thiểu 6 ký tự, có 1 chữ hoa"
                       placeholder="Nhập mật khẩu mới...">
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu mới <span style="color:var(--sp-green)">*</span></label>
                <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới...">
            </div>

            <button type="submit">CẬP NHẬT MẬT KHẨU</button>
        </form>

        <div class="auth-links">
            <p><a th:href="@{/login}">← Trở về Đăng nhập</a></p>
        </div>
    </div>
</div>

</body>
</html>
