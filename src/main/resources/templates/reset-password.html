<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <h2>🔑 Đặt Lại Mật Khẩu</h2>
        <p style="text-align: center; color: #b3b3b3; margin-bottom: 20px;">
            Vui lòng nhập mật khẩu mới cho tài khoản của bạn.
        </p>
        
        <div th:if="${error}" style="background-color: #ff4d4d; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-weight: bold;">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            
            <input type="hidden" name="token" th:value="${token}">

            <label>Mật khẩu mới (*):</label>
            <input type="password" name="password" required 
                   pattern="^(?=.*[A-Z]).{6,}$" 
                   title="Tối thiểu 6 ký tự, có 1 chữ hoa"
                   placeholder="Nhập mật khẩu mới...">

            <label>Xác nhận mật khẩu mới (*):</label>
            <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới...">

            <button type="submit">CẬP NHẬT MẬT KHẨU</button>
        </form>
    </div>
</body>
</html>
