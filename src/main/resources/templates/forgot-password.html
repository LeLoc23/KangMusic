<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Quên Mật Khẩu - KangMusic')}"></head>
<body class="auth-page" hx-boost="false">

<div class="auth-wrapper">
    <div class="auth-logo">
        <a th:href="@{/}">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="#1ed760">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
            <span class="auth-logo-text">KangMusic</span>
        </a>
    </div>

    <div class="auth-container">
        <h2>🔒 Quên Mật Khẩu</h2>

        <p style="text-align:center; color:var(--sp-text-muted); font-size:14px; margin-bottom:24px; line-height:1.6;">
            Nhập email của bạn, chúng tôi sẽ gửi đường dẫn để đặt lại mật khẩu.
        </p>

        <div th:if="${error}" class="auth-alert auth-alert-error">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="auth-alert auth-alert-success">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label>Địa chỉ Email của bạn</label>
                <input type="email" name="email" required placeholder="Nhập email đã đăng ký...">
            </div>
            <button type="submit">GỬI YÊU CẦU</button>
        </form>

        <div class="auth-links">
            <p>Nhớ ra mật khẩu rồi? <a th:href="@{/login}">Đăng nhập ngay</a></p>
        </div>
    </div>
</div>

</body>
</html>
