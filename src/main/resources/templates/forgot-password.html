<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <h2>🔒 Quên Mật Khẩu</h2>
        <p style="text-align: center; color: #b3b3b3; margin-bottom: 20px;">
            Nhập email của bạn, chúng tôi sẽ gửi đường dẫn để đặt lại mật khẩu.
        </p>
        
        <div th:if="${error}" style="background-color: #ff4d4d; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" style="background-color: #1db954; color: black; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-weight: bold;">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <label>Địa chỉ Email của bạn:</label>
            <input type="email" name="email" required placeholder="Nhập email đã đăng ký...">
            <button type="submit">GỬI YÊU CẦU</button>
        </form>
        
        <div class="auth-links">
            <p>Nhớ ra mật khẩu rồi? <a th:href="@{/login}">Đăng nhập ngay</a></p>
        </div>
    </div>
</body>
</html>
