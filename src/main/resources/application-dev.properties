# ============================================================
# DEVELOPMENT CONFIGURATION
# ============================================================

# Database: H2 File-based (stored in project root during dev)
spring.datasource.url=jdbc:h2:file:./music_data/MusicAppDB;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings — ddl-auto=update: Hibernate sẽ tự bổ sung cột còn thiếu vào DB cũ.
# Sau khi các migration V3 đã chạy xong và schema ổn định, có thể chuyển lại về 'validate'.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway (enabled by default when flyway-core is on classpath)
# baselineOnMigrate=true: if the DB already has tables (from previous ddl-auto=update),
# Flyway will accept the existing state as "baseline V1" without re-running V1.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# H2 Console (Dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Dev Upload Directory
app.upload.dir=./src/main/resources/static/media/

# Base URL for local dev
app.base-url=http://localhost:8080

# Tắt cache static resources trong dev (CSS, JS luôn reload mới nhất)
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.thymeleaf.cache=false
