# ============================================================
# PRODUCTION CONFIGURATION
# ============================================================

# Use environment variables for Production DB (e.g. MySQL / PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA settings for Prod — Flyway owns all schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — enabled in prod; runs migrations at startup before app accepts traffic
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# H2 Console MUST BE DISABLED IN PROD
spring.h2.console.enabled=false

# External Upload Directory for Prod (e.g., persistent volume)
app.upload.dir=/app/data/media/

# True Prod URL injected via ENV
app.base-url=${APP_URL}
