# ============================================================
# SHARED CONFIGURATION (all environments)
# ============================================================

# Upload directory — override per environment
app.upload.dir=./uploads/media

# App base URL — override in prod
app.base-url=http://localhost:8080

# Upload size limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Mail (override credentials in prod via environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Active profile — change to 'prod' on Railway / deployment
spring.profiles.active=dev
